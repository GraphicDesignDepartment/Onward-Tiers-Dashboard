name: Deploy Supabase functions

on:
  workflow_dispatch:

permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Deploy onboarding function
        run: supabase functions deploy onboard-customer --project-ref uoplwpdotljszvsdcofn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Deploy notification processor
        run: supabase functions deploy process-notifications --project-ref uoplwpdotljszvsdcofn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
