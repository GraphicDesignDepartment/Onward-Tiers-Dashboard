name: Quality gate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  application:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Start isolated Supabase
        run: supabase start
      - name: Run database regression tests
        env:
          PGURI: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          psql "$PGURI" -v ON_ERROR_STOP=1 -f supabase/tests/rewards_engine.sql
          psql "$PGURI" -v ON_ERROR_STOP=1 -f supabase/tests/rls_customer_isolation.sql
          psql "$PGURI" -v ON_ERROR_STOP=1 -f supabase/tests/redemption_workflow.sql
