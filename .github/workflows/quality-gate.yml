name: Quality gate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true
jobs:
  application:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Start isolated Supabase
        run: supabase start
      - name: Run database regression tests
        env:
          PGURI: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          psql "$PGURI" -v ON_ERROR_STOP=1 -f supabase/tests/rewards_engine.sql
          psql "$PGURI" -v ON_ERROR_STOP=1 -f supabase/tests/rls_customer_isolation.sql
          psql "$PGURI" -v ON_ERROR_STOP=1 -f supabase/tests/redemption_workflow.sql
          psql "$PGURI" -v ON_ERROR_STOP=1 -f supabase/tests/notifications_support.sql
          psql "$PGURI" -v ON_ERROR_STOP=1 -f supabase/tests/operations_health.sql
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start isolated Supabase and seed E2E users
        env:
          PGURI: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          supabase start
          psql "$PGURI" -v ON_ERROR_STOP=1 -f supabase/tests/e2e_seed.sql
          echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> "$GITHUB_ENV"
          ANON_KEY=$(supabase status -o env | sed -n 's/^ANON_KEY="\(.*\)"$/\1/p')
          test -n "$ANON_KEY"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY" >> "$GITHUB_ENV"
      - name: Run authenticated browser journeys
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
